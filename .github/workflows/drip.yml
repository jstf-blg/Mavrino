name: Drip Publisher (per-category, evenly spaced)

# Publishes posts spread evenly across the day with a per-main-category daily quota.
# The drip self-paces (publishes only what's due to stay on an even schedule) and
# self-limits (stops at each category's daily target), so a skipped/delayed run is
# harmless — the next run catches up the backlog.
#
# Catch-up: 5 posts/category on DRIP_CATCHUP_DATE, then 2/category/day afterwards
# (the switch is automatic — no edit needed once the catch-up day passes).
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min; drip decides whether anything is due
  workflow_dispatch:

concurrency:
  group: mavrino-publish
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WP_CLIENT_ID=${{ secrets.WP_CLIENT_ID }}
          WP_CLIENT_SECRET=${{ secrets.WP_CLIENT_SECRET }}
          WP_SITE=${{ secrets.WP_SITE }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_PASSWORD=${{ secrets.WP_PASSWORD }}
          SITE_DOMAIN=https://mavrino.com
          AUTHOR_NAME=Mavrino
          AUTHOR_BIO=${{ secrets.AUTHOR_BIO }}
          AMAZON_ACCESS_KEY=${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY=${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_ASSOCIATE_TAG=${{ secrets.AMAZON_ASSOCIATE_TAG }}
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          MAVRINO_SEARCH_SECRET=mvr_sk_a7f3e91c8b2d4f60
          OUTPUT_DIR=./output
          DRIP_CATCHUP_DATE=2026-06-15
          DRIP_TODAY_TARGET=2
          DRIP_DAILY_TARGET=1
          DRIP_PER_RUN_CAP=2
          NICHES=air fryers,coffee makers,blenders,food processors,stand mixers,toaster ovens,electric kettles,robot vacuums,air purifiers,stick vacuums,humidifiers,space heaters,luggage,travel backpacks,packing cubes,portable chargers,travel pillows,standing desks,office chairs,monitors,mechanical keyboards,webcams,massage guns,fitness trackers,smart scales,yoga mats,adjustable dumbbells,coolers,tents,camping chairs,portable grills,sleeping bags
          EOF

      - name: Create required directories
        run: |
          mkdir -p config logs output config/product_cache config/image_cache
          [ -f config/keyword_queue.json ] || echo "[]" > config/keyword_queue.json
          [ -f config/keywords_done.json ] || echo "[]" > config/keywords_done.json
          [ -f config/posts_log.json ]     || echo "[]" > config/posts_log.json
          [ -f config/taxonomy.json ]      || echo '{"wp_category_ids":{},"wp_tag_ids":{},"post_index":[],"category_counts":{},"pending_splits":[],"last_health_check":null}' > config/taxonomy.json

      - name: Configure git
        run: |
          git config user.name  "Pipeline Bot"
          git config user.email "pipeline@noreply.github.com"

      - name: Run drip
        run: python drip.py

      - name: Commit state
        run: |
          git pull --rebase --autostash || true
          git add config/ || true
          git diff --cached --quiet || git commit -m "Drip state $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
