name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no API calls, no publishing)'
        required: false
        default: 'false'
        type: boolean
      posts_override:
        description: 'Override posts per day'
        required: false
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WP_CLIENT_ID=${{ secrets.WP_CLIENT_ID }}
          WP_CLIENT_SECRET=${{ secrets.WP_CLIENT_SECRET }}
          WP_SITE=${{ secrets.WP_SITE }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_PASSWORD=${{ secrets.WP_PASSWORD }}
          AUTHOR_NAME=${{ secrets.AUTHOR_NAME }}
          AUTHOR_BIO=${{ secrets.AUTHOR_BIO }}
          AMAZON_ASSOCIATE_TAG=${{ secrets.AMAZON_ASSOCIATE_TAG }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          OUTPUT_DIR=./output
          NICHES=air fryers,coffee makers,blenders,food processors,stand mixers,toaster ovens,electric kettles
          EOF
          if [ -n "${{ github.event.inputs.posts_override }}" ]; then
            echo "POSTS_PER_DAY=${{ github.event.inputs.posts_override }}" >> .env
          else
            echo "POSTS_PER_DAY=5" >> .env
          fi

      - name: Create required directories
        run: |
          mkdir -p config logs output config/product_cache
          [ -f config/keyword_queue.json ] || echo "[]" > config/keyword_queue.json
          [ -f config/keywords_done.json ] || echo "[]" > config/keywords_done.json
          [ -f config/posts_log.json ]     || echo "[]" > config/posts_log.json
          [ -f config/taxonomy.json ]      || echo '{"wp_category_ids":{},"wp_tag_ids":{},"post_index":[],"category_counts":{},"pending_splits":[],"last_health_check":null}' > config/taxonomy.json

      - name: Configure git
        run: |
          git config user.name  "Pipeline Bot"
          git config user.email "pipeline@noreply.github.com"

      - name: Run pipeline
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python run_pipeline.py --dry-run
          else
            python run_pipeline.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit config state
        run: |
          git add config/ || true
          git diff --cached --quiet || git commit -m "Pipeline state update $(date +%Y-%m-%d)"
          git push || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
