name: Hourly Post Scheduler

# Keeps a unique, deep post scheduled for every upcoming hour via WordPress
# future-dating (status=future → WP auto-publishes on time, no runner needed at
# publish time). Runs every 6h and tops up the buffer; idempotent + resumable, so
# it only fills empty hourly slots and survives timeouts. Replaces the old drip.
on:
  schedule:
    # Hourly ATTEMPTS — GitHub silently drops scheduled crons under load, so we retry
    # every hour. Combined with the deep 3-day buffer below, a string of dropped crons
    # can't drain the queue (idempotent: each run only fills still-empty future slots).
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      cap:
        description: 'Max posts to generate this run'
        required: false
        default: '12'

concurrency:
  group: mavrino-publish
  cancel-in-progress: false

jobs:
  schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WP_CLIENT_ID=${{ secrets.WP_CLIENT_ID }}
          WP_CLIENT_SECRET=${{ secrets.WP_CLIENT_SECRET }}
          WP_SITE=${{ secrets.WP_SITE }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_PASSWORD=${{ secrets.WP_PASSWORD }}
          SITE_DOMAIN=https://mavrino.com
          AUTHOR_NAME=Mavrino
          AUTHOR_BIO=${{ secrets.AUTHOR_BIO }}
          AMAZON_ACCESS_KEY=${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY=${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_ASSOCIATE_TAG=${{ secrets.AMAZON_ASSOCIATE_TAG }}
          UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
          MAVRINO_SEARCH_SECRET=${{ secrets.MAVRINO_SEARCH_SECRET }}
          OUTPUT_DIR=./output
          SCHEDULE_HORIZON_HOURS=72
          SCHEDULE_PER_RUN_CAP=${{ github.event.inputs.cap || '12' }}
          NICHES=air fryers,coffee makers,blenders,food processors,stand mixers,toaster ovens,electric kettles,robot vacuums,air purifiers,stick vacuums,humidifiers,space heaters,luggage,travel backpacks,packing cubes,portable chargers,travel pillows,standing desks,office chairs,monitors,mechanical keyboards,webcams,massage guns,fitness trackers,smart scales,yoga mats,adjustable dumbbells,coolers,tents,camping chairs,portable grills,sleeping bags,ev chargers,electric scooters,electric bikes,portable power stations
          EOF

      - name: Create required directories
        run: |
          mkdir -p config logs output config/product_cache config/image_cache
          [ -f config/keyword_queue.json ] || echo "[]" > config/keyword_queue.json
          [ -f config/keywords_done.json ] || echo "[]" > config/keywords_done.json
          [ -f config/posts_log.json ]     || echo "[]" > config/posts_log.json

      - name: Configure git
        run: |
          git config user.name  "Scheduler Bot"
          git config user.email "scheduler@noreply.github.com"

      - name: Schedule posts
        run: python schedule_batch.py

      - name: Commit state
        run: |
          git pull --rebase --autostash || true
          git add config/ || true
          git diff --cached --quiet || git commit -m "Schedule batch $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
